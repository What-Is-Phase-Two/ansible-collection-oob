name: Integration Tests
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  integration:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          path: ansible_collections/lantronix/oob

      - name: Install Python dependencies
        run: pip install ansible-core requests

      - name: Install Ansible collections
        run: |
          ansible-galaxy collection install ansible.netcommon
          ansible-galaxy collection install . --force
        working-directory: ansible_collections/lantronix/oob

      - name: Prepare integration config
        env:
          SLC9_PASSWORD: ${{ secrets.SLC9_PASSWORD }}
          PERCEPXION_USERNAME: ${{ secrets.PERCEPXION_USERNAME }}
          PERCEPXION_PASSWORD: ${{ secrets.PERCEPXION_PASSWORD }}
          PERCEPXION_PROJECT_TAG: ${{ secrets.PERCEPXION_PROJECT_TAG }}
        run: |
          cp tests/integration/integration_config.yml.template \
             tests/integration/integration_config.yml
          sed -i "s|slc9_password: \"\"|slc9_password: \"${SLC9_PASSWORD}\"|" \
              tests/integration/integration_config.yml
          sed -i "s|percepxion_username: \"\"|percepxion_username: \"${PERCEPXION_USERNAME}\"|" \
              tests/integration/integration_config.yml
          sed -i "s|percepxion_password: \"\"|percepxion_password: \"${PERCEPXION_PASSWORD}\"|" \
              tests/integration/integration_config.yml
          sed -i "s|percepxion_project_tag: \"\"|percepxion_project_tag: \"${PERCEPXION_PROJECT_TAG}\"|" \
              tests/integration/integration_config.yml
        working-directory: ansible_collections/lantronix/oob

      - name: Run integration tests
        run: |
          cd ansible_collections/lantronix/oob
          ansible-test integration --python 3.11
