---
# action=batch is NOT tested here — batch applies arbitrary config
# changes which could leave the device in an unpredictable state.

- name: Get running config (action=get)
  lantronix.oob.slc_config:
    action: get
  register: get_result

- name: Assert commands is a list
  ansible.builtin.assert:
    that:
      - get_result.commands is defined
      - get_result.commands is iterable
      - get_result.commands is not string
    success_msg: "Running config returned {{ get_result.commands | length }} command lines"
    fail_msg: "result.commands not returned or not a list"

- name: Assert commands list is not empty
  ansible.builtin.assert:
    that:
      - get_result.commands | length > 0
    success_msg: "Commands list has {{ get_result.commands | length }} entries"
    fail_msg: "result.commands is empty — expected at least one config line"

- name: Assert get did not report a change (read-only)
  ansible.builtin.assert:
    that:
      - get_result.changed is false
    success_msg: "Config get correctly reported changed=false"
    fail_msg: "Config get reported changed=true — action=get should be read-only"

# --- COMPARE ---

- name: Compare running config vs saved config (action=compare)
  lantronix.oob.slc_config:
    action: compare
  register: compare_result

- name: Assert diff key is returned
  ansible.builtin.assert:
    that:
      - compare_result.diff is defined
      - compare_result.diff is string
    success_msg: "Config compare returned diff (length={{ compare_result.diff | length }})"
    fail_msg: "result.diff not returned or not a string"

- name: Assert compare did not report a change (read-only)
  ansible.builtin.assert:
    that:
      - compare_result.changed is false
    success_msg: "Config compare correctly reported changed=false"
    fail_msg: "Config compare reported changed=true — action=compare should be read-only"

# --- SAVE ---

- name: Save running config (action=save)
  lantronix.oob.slc_config:
    action: save
  register: save_result

- name: Assert save reported changed
  ansible.builtin.assert:
    that:
      - save_result.changed is true
    success_msg: "Config save correctly reported changed=true"
    fail_msg: "Expected changed=true for action=save, got changed={{ save_result.changed }}"
