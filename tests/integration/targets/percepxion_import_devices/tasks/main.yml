---
# The Ansible-OOB test tenant has SLC9000-RH already registered.
# This test verifies the module correctly skips re-importing it.

- name: Attempt to import already-registered device (expect skipped)
  lantronix.oob.percepxion_import_devices:
    devices:
      - serial: "SLC9000-RH"
  register: import_result

- name: Verify device was skipped (already registered)
  ansible.builtin.assert:
    that:
      - import_result.skipped | length > 0
      - import_result.registered | length == 0
      - import_result.changed is false
    fail_msg: "Expected SLC9000-RH to be skipped, got registered={{ import_result.registered }}, skipped={{ import_result.skipped }}"
