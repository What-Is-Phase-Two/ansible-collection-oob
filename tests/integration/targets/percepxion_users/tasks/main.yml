---
# Full CRUD cycle for percepxion_users.
# Creates a test user, verifies idempotency, then deletes it.
# Uses block/always to guarantee cleanup even on failure.

# Pre-clean: remove test user if left from a prior failed run
- name: Pre-clean - ensure test user does not exist
  lantronix.oob.percepxion_users:
    username: "ansible-test-user@ansible.local"
    state: absent
  ignore_errors: true  # noqa: ignore-errors

- name: Percepxion users CRUD test
  block:

    # --- CREATE ---

    - name: Create test user
      lantronix.oob.percepxion_users:
        username: "ansible-test-user@ansible.local"
        password: "AnsibleTest123!"
        role: "viewer"
        state: present
      register: create_result

    - name: Verify creation reported changed
      ansible.builtin.assert:
        that:
          - create_result.changed is true
          - create_result.username == 'ansible-test-user@ansible.local'
        success_msg: "User created: {{ create_result.username }}"
        fail_msg: "User creation failed or missing fields: {{ create_result }}"

    # --- IDEMPOTENCY ---

    - name: Create same user again to verify idempotency
      lantronix.oob.percepxion_users:
        username: "ansible-test-user@ansible.local"
        password: "AnsibleTest123!"
        role: "viewer"
        state: present
      register: idempotent_create

    - name: Verify idempotent create reports no change
      ansible.builtin.assert:
        that:
          - idempotent_create.changed is false
        success_msg: "Idempotent create correctly reported changed=false"
        fail_msg: "Expected changed=false on repeat create, got: {{ idempotent_create.changed }}"

    # --- DELETE ---

    - name: Delete test user
      lantronix.oob.percepxion_users:
        username: "ansible-test-user@ansible.local"
        state: absent
      register: delete_result

    - name: Verify deletion reported changed
      ansible.builtin.assert:
        that:
          - delete_result.changed is true
        success_msg: "User deleted, changed=true"
        fail_msg: "Delete did not report changed: {{ delete_result }}"

    # --- IDEMPOTENCY (absent again) ---

    - name: Delete same user again to verify absent idempotency
      lantronix.oob.percepxion_users:
        username: "ansible-test-user@ansible.local"
        state: absent
      register: idempotent_delete

    - name: Verify idempotent delete reports no change
      ansible.builtin.assert:
        that:
          - idempotent_delete.changed is false
        success_msg: "Idempotent delete correctly reported changed=false"
        fail_msg: "Expected changed=false on repeat delete, got: {{ idempotent_delete.changed }}"

  always:
    - name: Cleanup - ensure test user is removed
      lantronix.oob.percepxion_users:
        username: "ansible-test-user@ansible.local"
        state: absent
      ignore_errors: true  # noqa: ignore-errors
