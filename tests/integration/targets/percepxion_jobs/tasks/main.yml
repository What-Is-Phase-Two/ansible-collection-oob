---
# Full CRUD cycle for percepxion_jobs.
# Creates a test job, verifies idempotency, queries it, then deletes it.
# Uses block/always to guarantee cleanup even on failure.

# Pre-clean: remove test job if left from a prior failed run
- name: Pre-clean - ensure test job does not exist
  lantronix.oob.percepxion_jobs:
    name: "ansible-test-job"
    state: absent
  ignore_errors: true  # noqa: ignore-errors

- name: Percepxion jobs CRUD test
  block:

    # --- CREATE ---

    - name: Create test job
      lantronix.oob.percepxion_jobs:
        name: "ansible-test-job"
        job_type: "firmware_check"
        enabled: true
        state: present
      register: create_result

    - name: Verify creation reported changed
      ansible.builtin.assert:
        that:
          - create_result.changed is true
          - create_result.job_group_id is defined
          - create_result.job_group_id | length > 0
        success_msg: "Job created: id={{ create_result.job_group_id }}"
        fail_msg: "Job creation failed or missing job_group_id: {{ create_result }}"

    - name: Store job_group_id for query test
      ansible.builtin.set_fact:
        test_job_group_id: "{{ create_result.job_group_id }}"

    # --- IDEMPOTENCY ---

    - name: Create same job again to verify idempotency
      lantronix.oob.percepxion_jobs:
        name: "ansible-test-job"
        job_type: "firmware_check"
        enabled: true
        state: present
      register: idempotent_create

    - name: Verify idempotent create reports no change
      ansible.builtin.assert:
        that:
          - idempotent_create.changed is false
        success_msg: "Idempotent create correctly reported changed=false"
        fail_msg: "Expected changed=false on repeat create, got: {{ idempotent_create.changed }}"

    # --- QUERY ---

    - name: Query job logs
      lantronix.oob.percepxion_jobs:
        name: "ansible-test-job"
        state: query
      register: query_result

    - name: Verify query returns job_logs list
      ansible.builtin.assert:
        that:
          - query_result.job_logs is defined
          - query_result.job_logs is iterable
        success_msg: "Job query returned {{ query_result.job_logs | length }} log entries"
        fail_msg: "job_logs key missing or not a list: {{ query_result }}"

    # --- DELETE ---

    - name: Delete test job
      lantronix.oob.percepxion_jobs:
        name: "ansible-test-job"
        state: absent
      register: delete_result

    - name: Verify deletion reported changed
      ansible.builtin.assert:
        that:
          - delete_result.changed is true
        success_msg: "Job deleted, changed=true"
        fail_msg: "Delete did not report changed: {{ delete_result }}"

    # --- IDEMPOTENCY (absent again) ---

    - name: Delete same job again to verify absent idempotency
      lantronix.oob.percepxion_jobs:
        name: "ansible-test-job"
        state: absent
      register: idempotent_delete

    - name: Verify idempotent delete reports no change
      ansible.builtin.assert:
        that:
          - idempotent_delete.changed is false
        success_msg: "Idempotent delete correctly reported changed=false"
        fail_msg: "Expected changed=false on repeat delete, got: {{ idempotent_delete.changed }}"

  always:
    - name: Cleanup - ensure test job is removed
      lantronix.oob.percepxion_jobs:
        name: "ansible-test-job"
        state: absent
      ignore_errors: true  # noqa: ignore-errors
